# Alembic configuration.
# Run migrations:   alembic upgrade head
# Generate new:     alembic revision --autogenerate -m "msg"
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is set programmatically in env.py from settings.DATABASE_URL
sqlalchemy.url =
# NOTE: existing migrations use a manual "NNNN_description" revision id/filename
# convention (0001_baseline, 0002_..., 0003_...), not Alembic's default random hex.
# `alembic revision --autogenerate` will NOT follow this automatically — after
# generating a new migration, manually rename the file and edit `revision =`
# to the next "NNNN_description" (keep it short: alembic_version.version_num
# is VARCHAR(32) — a too-long revision id fails the migration with a truncation
# error, not a clean validation message).

[loggers]
keys = root,sqlalchemy,alembic
[handlers]
keys = console
[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
